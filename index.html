<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全国电台聚合 - 实时收听</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px 24px; border-bottom: 2px solid #e94560; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
.header .sub { font-size: 12px; color: #8899aa; }
.search-bar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; outline: none; transition: border .2s; }
.search-bar input:focus, .search-bar select:focus { border-color: #e94560; }
.search-bar input { flex: 1; min-width: 200px; }
.search-bar select { min-width: 130px; }
.tag-bar { display: flex; gap: 8px; margin-top: 10px; }
.tag-btn { padding: 5px 16px; border-radius: 16px; border: 1px solid #444; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 13px; transition: all .2s; }
.tag-btn:hover { border-color: #e94560; color: #fff; }
.tag-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
.player-bar { background: #1a1a2e; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #222; position: sticky; top: 112px; z-index: 99; }
.player-bar .now-playing { flex: 1; font-size: 15px; }
.player-bar .now-playing .name { color: #e94560; font-weight: bold; }
.player-bar .now-playing .prov { font-size: 12px; color: #888; }
.player-bar .status { font-size: 12px; color: #4caf50; }
.player-bar .stop-btn { padding: 6px 16px; border-radius: 6px; background: #e94560; color: #fff; border: none; cursor: pointer; font-size: 13px; }
.player-bar .stop-btn:hover { background: #ff6b81; }
.stats { padding: 8px 24px; font-size: 12px; color: #666; border-bottom: 1px solid #1a1a1a; background: #111; }
.main { padding: 16px 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card { background: #1a1a1a; border: 1px solid #252525; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all .2s; position: relative; }
.card:hover { border-color: #e94560; background: #1e1e24; transform: translateY(-1px); }
.card.active { border-color: #e94560; background: #1e1020; box-shadow: 0 0 20px rgba(233,69,96,0.15); }
.card .card-name { font-size: 16px; font-weight: 600; color: #f0f0f0; margin-bottom: 4px; }
.card .card-prov { font-size: 11px; color: #e94560; background: rgba(233,69,96,0.1); display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
.card .card-freq { font-size: 12px; color: #888; line-height: 1.6; }
.card .card-freq span { color: #4fc3f7; }
.audio-hidden { display: none; }
.notice { text-align: center; padding: 60px 20px; color: #666; }
.notice .icon { font-size: 48px; margin-bottom: 16px; }
.footer { text-align: center; padding: 20px; font-size: 11px; color: #444; border-top: 1px solid #1a1a1a; margin-top: 20px; }
@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .search-bar input, .search-bar select { width: 100%; }
    .player-bar { top: 152px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>全国电台聚合</h1>
    <div class="sub">搜索频率，实时收听在播节目</div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索电台名称、频率（如 106.1、交通、音乐）..." oninput="filterStations()">
        <select id="provFilter" onchange="filterStations()">
            <option value="">全部省份</option>
        </select>
    </div>
    <div class="tag-bar">
        <button class="tag-btn active" onclick="setTag('all', this)">全国</button>
        <button class="tag-btn" onclick="setTag('享佳', this)">享佳</button>
    </div>
</div>

<div class="player-bar" id="playerBar">
    <div class="now-playing">
        <span id="playingName" class="name">未选择电台</span>
        <span id="playingProv" class="prov"></span>
    </div>
    <span class="status" id="playingStatus"></span>
    <button class="stop-btn" onclick="stopPlaying()">停止</button>
</div>

<div class="stats" id="stats">共 0 个电台</div>

<div class="main">
    <div class="grid" id="stationGrid"></div>
</div>

<div class="notice" id="noResult" style="display:none">
    <div class="icon">📻</div>
    <div>没有匹配的电台</div>
</div>

<div class="footer">
    数据来源：央广/各省广播电视台公开流媒体 | 实时流可能因网络波动暂不可用
    <br><span id="visitCount" style="margin-top:4px;display:inline-block">访问人数加载中...</span>
</div>

<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
// 不蒜子计数器
setTimeout(function(){
    var pv = document.getElementById('busuanzi_value_site_pv');
    var uv = document.getElementById('busuanzi_value_site_uv');
    var el = document.getElementById('visitCount');
    if(pv && uv && pv.textContent){
        el.innerHTML = '👁 页面访问 ' + pv.textContent + ' 次 | 独立访客 ' + uv.textContent + ' 人';
    } else {
        el.innerHTML = '计数加载中，请稍候...';
    }
}, 3000);
</script>

// 初始化
let currentStation = null;
let currentTag = 'all';

function setTag(tag, btn) {
    currentTag = tag;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterStations();
}
let allProvinces = [...new Set(STATIONS.map(s => s.province))].sort();

// 填充省份选择器
const provFilter = document.getElementById('provFilter');
allProvinces.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    provFilter.appendChild(opt);
});

function formatFreq(freq) {
    if (!freq || Object.keys(freq).length === 0) return '';
    let parts = [];
    if (freq.fm) {
        let cities = Object.entries(freq.fm).slice(0, 6).map(([c, f]) => `<span>${c} FM${f}</span>`).join(' ');
        parts.push(cities);
    }
    if (freq.am) {
        let ams = Object.entries(freq.am).map(([c, f]) => `<span>${c} AM${f}</span>`).join(' ');
        parts.push(ams);
    }
    return parts.join(' | ');
}

function renderStations(stations) {
    const grid = document.getElementById('stationGrid');
    const noResult = document.getElementById('noResult');
    const stats = document.getElementById('stats');
    
    stats.textContent = `共 ${stations.length} 个电台`;
    
    if (stations.length === 0) {
        grid.innerHTML = '';
        noResult.style.display = 'block';
        return;
    }
    
    noResult.style.display = 'none';
    grid.innerHTML = stations.map(s => {
        const freqHtml = formatFreq(s.freq);
        return `
            <div class="card ${currentStation && currentStation.url === s.url ? 'active' : ''}" 
                 onclick="playStation('${s.name.replace(/'/g, "\'")}', '${s.province.replace(/'/g, "\'")}', '${s.url.replace(/'/g, "\'")}', this)">
                <div class="card-name">${s.name}</div>
                <div class="card-prov">${s.province}</div>
                ${freqHtml ? '<div class="card-freq">' + freqHtml + '</div>' : ''}
            </div>
        `;
    }).join('');
}

function filterStations() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const prov = document.getElementById('provFilter').value;
    
    let filtered = STATIONS;
    
    // 标签筛选
    if (currentTag === '享佳') {
        filtered = filtered.filter(s => s.tags && s.tags.includes('享佳'));
    }
    
    if (prov) {
        filtered = filtered.filter(s => s.province === prov);
    }
    
    if (search) {
        filtered = filtered.filter(s => {
            // 按名称搜索
            if (s.name.toLowerCase().includes(search)) return true;
            if (s.tvg_name && s.tvg_name.toLowerCase().includes(search)) return true;
            // 按频率搜索
            if (s.freq && s.freq.fm) {
                for (let [city, f] of Object.entries(s.freq.fm)) {
                    if (f.includes(search) || city.includes(search)) return true;
                }
            }
            if (s.freq && s.freq.am) {
                for (let [area, f] of Object.entries(s.freq.am)) {
                    if (f.includes(search)) return true;
                }
            }
            return false;
        });
    }
    
    // 总台排最前，其他按省份排
    filtered.sort((a, b) => {
        if (a.province === '总台' && b.province !== '总台') return -1;
        if (a.province !== '总台' && b.province === '总台') return 1;
        return a.province.localeCompare(b.province) || a.name.localeCompare(b.name);
    });
    
    renderStations(filtered);
}

function playStation(name, province, url, cardEl) {
    const player = document.getElementById('audioPlayer');
    const playingName = document.getElementById('playingName');
    const playingProv = document.getElementById('playingProv');
    const playingStatus = document.getElementById('playingStatus');
    
    // 更新 UI
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    if (cardEl) cardEl.classList.add('active');
    
    playingName.textContent = name;
    playingProv.textContent = province;
    playingStatus.textContent = '加载中...';
    currentStation = { name, province, url };
    
    // 使用 HLS.js 或直接播放
    if (url.endsWith('.m3u8')) {
        // 动态加载 HLS.js
        if (!window.Hls) {
            playingStatus.textContent = '加载播放器...';
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
            script.onload = () => startHLS(url);
            script.onerror = () => tryDirectPlay(url);
            document.head.appendChild(script);
        } else {
            startHLS(url);
        }
    } else {
        player.src = url;
        player.load();
        player.play().then(() => {
            playingStatus.textContent = '正在播放';
        }).catch(e => {
            playingStatus.textContent = '播放失败: ' + e.message;
        });
    }
}

function startHLS(url) {
    const player = document.getElementById('audioPlayer');
    const playingStatus = document.getElementById('playingStatus');
    
    // 先清理上一个实例
    if (player._hls) {
        player._hls.destroy();
        player._hls = null;
    }
    player.src = '';
    
    if (Hls.isSupported()) {
        const hls = new Hls({
            autoStartLoad: true,
            startPosition: -1,
            debug: false,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            manifestLoadingTimeOut: 15000,
            manifestLoadingMaxRetry: 3,
            levelLoadingTimeOut: 15000,
            levelLoadingMaxRetry: 3,
            fragLoadingTimeOut: 20000,
            fragLoadingMaxRetry: 6
        });
        
        hls.loadSource(url);
        hls.attachMedia(player);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            player.play().then(() => {
                playingStatus.textContent = '正在播放';
            }).catch(e => {
                playingStatus.textContent = '点击播放按钮开始';
            });
        });
        
        // 错误恢复：带退避重试 + 实例重建
        hls._retryCount = 0;
        hls._maxRetries = 8;
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            hls._retryCount = 0; // manifest 解析成功则重置计数
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                hls._retryCount++;
                const delay = Math.min(hls._retryCount * 800, 6000);
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        playingStatus.textContent = `网络中断，第${hls._retryCount}次重试...`;
                        setTimeout(() => hls.startLoad(), delay);
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        playingStatus.textContent = `媒体错误，第${hls._retryCount}次恢复...`;
                        setTimeout(() => hls.recoverMediaError(), delay);
                        break;
                    default:
                        playingStatus.textContent = '播放失败，切换直连模式...';
                        hls.destroy();
                        tryDirectPlay(url);
                        return;
                }
                // 超过最大重试次数，重建 HLS 实例
                if (hls._retryCount >= hls._maxRetries) {
                    playingStatus.textContent = '多次失败，重建播放器...';
                    hls.destroy();
                    player._hls = null;
                    setTimeout(() => startHLS(url), 1500);
                }
            }
        });
        
        player._hls = hls;
    } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
        tryDirectPlay(url);
    } else {
        playingStatus.textContent = '浏览器不支持播放此格式';
    }
}

// 监听 audio 元素的中断事件
document.getElementById('audioPlayer').addEventListener('stalled', () => {
    const player = document.getElementById('audioPlayer');
    const playingStatus = document.getElementById('playingStatus');
    playingStatus.textContent = '缓冲中...';
    // 尝试恢复
    if (player._hls) {
        player._hls.startLoad();
    }
});

document.getElementById('audioPlayer').addEventListener('playing', () => {
    document.getElementById('playingStatus').textContent = '正在播放';
});

document.getElementById('audioPlayer').addEventListener('waiting', () => {
    document.getElementById('playingStatus').textContent = '加载中...';
});

function tryDirectPlay(url) {
    const player = document.getElementById('audioPlayer');
    const playingStatus = document.getElementById('playingStatus');
    player.src = url;
    player.load();
    player.play().then(() => {
        playingStatus.textContent = '正在播放';
    }).catch(e => {
        playingStatus.textContent = '播放受阻，可尝试右键新标签打开';
    });
}

function stopPlaying() {
    const player = document.getElementById('audioPlayer');
    const playingName = document.getElementById('playingName');
    const playingProv = document.getElementById('playingProv');
    const playingStatus = document.getElementById('playingStatus');
    
    if (player._hls) {
        player._hls.destroy();
        player._hls = null;
    }
    player.pause();
    player.src = '';
    playingName.textContent = '未选择电台';
    playingProv.textContent = '';
    playingStatus.textContent = '';
    currentStation = null;
    
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

// 初始渲染
filterStations();

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') stopPlaying();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
    }
});
